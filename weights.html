<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Explorer — Index</title>
    <link rel="stylesheet" href="/static/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    

    <style>
      .wp-banner {
        display: flex; align-items: center; justify-content: center;
        gap: 0.9rem; flex-wrap: wrap;
        padding: 0.5rem 1.5rem;
        background: linear-gradient(90deg, rgba(233,179,59,0.10), rgba(122,162,247,0.10));
        border-bottom: 1px solid var(--border, #30363d);
        font-size: 0.8rem; color: var(--text2, #8b949e);
      }
      .wp-banner-tag {
        display: inline-block; padding: 2px 8px;
        font-size: 0.68rem; font-weight: 600;
        letter-spacing: 0.08em; text-transform: uppercase;
        border-radius: 10px;
        background: rgba(233,179,59,0.18);
        color: #e9b33b;
        border: 1px solid rgba(233,179,59,0.35);
      }
      .wp-banner-authors { color: var(--text, #e6edf3); }
      .wp-banner-authors .wp-wip { color: #e9b33b; font-size: 0.7rem; margin-left: 0.25rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/index.html" class="nav-brand">Weightpedia</a>
        <div class="nav-links">
        </div>
    </nav>
    <div class="wp-banner">
        <span class="wp-banner-tag">Anonymous review</span>
        <span>Submitted under anonymous review. Full version with case studies will be released alongside the paper.</span>
    </div>

    <main class="container">
        
<div x-data="weightIndex()" x-init="init()">
    <!-- Model selector -->
    <div style="display:flex; gap:12px; justify-content:center; margin:1rem 0 1.2rem;">
        <div style="border:2px solid #61afef; border-radius:8px; padding:14px 22px; background:#1e2030; cursor:default; min-width:220px; text-align:center;">
            <div style="font-size:0.75rem; color:#61afef; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">Active</div>
            <div style="font-weight:bold; color:#e0e0e0; font-size:1rem;">Gao et al. 2025</div>
            <div style="font-size:0.78rem; color:#888; margin-top:4px;"><code>csp_yolo1</code> · 118M params · 95% sparse</div>
        </div>
    </div>

    <!-- Summary stats -->
    <div class="stats-bar">
        <div class="stat">
            <span class="stat-value" x-text="profiledWeights">...</span>
            <span class="stat-label">Profiled</span>
        </div>
        <div class="stat">
            <span class="stat-value" x-text="totalWeights">...</span>
            <span class="stat-label">Scanned</span>
        </div>

    </div>

    <div class="index-layout">
        <!-- Filter sidebar -->
        <aside class="filter-sidebar">
            <h3>Filters</h3>

            <div class="filter-group">
                <label>Profile</label>
                <select x-model="filters.profiled" @change="fetchWeights()">
                    <option value="yes">Profiled only</option>
                    <option value="">All weights</option>
                    <option value="no">Not profiled</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Layer</label>
                <select x-model="filters.layer" @change="fetchWeights()">
                    <option value="">All layers</option>
                    <template x-for="l in availableLayers" :key="l">
                        <option :value="l" x-text="'Layer ' + l"></option>
                    </template>
                </select>
            </div>

            <div class="filter-group">
                <label>Component</label>
                <select x-model="filters.component" @change="fetchWeights()">
                    <option value="">All components</option>
                    <template x-for="c in availableComponents" :key="c">
                        <option :value="c" x-text="c"></option>
                    </template>
                </select>
            </div>



            <div class="filter-group">
                <label>Min KL</label>
                <input type="number" x-model.number="filters.min_kl"
                       @change="fetchWeights()" step="0.01" min="0" placeholder="0.0">
            </div>

            <div class="filter-group">
                <label>Search</label>
                <input type="text" x-model="filters.q"
                       @input.debounce.300ms="fetchWeights()" placeholder="param name...">
            </div>

            <button class="btn btn-secondary" @click="resetFilters()">Reset Filters</button>
        </aside>

        <!-- Weight table -->
        <div class="table-container">
            <div class="table-header">
                <span x-text="filteredCount + ' weights'" class="result-count"></span>
            </div>
            <table class="weight-table">
                <thead>
                    <tr>
                        <th @click="setSort('rank')" class="sortable" :class="sortClass('rank')">Rank</th>
                        <th @click="setSort('layer')" class="sortable" :class="sortClass('layer')">Layer</th>
                        <th>Component</th>
                        <th>Param</th>
                        <th @click="setSort('max_kl')" class="sortable" :class="sortClass('max_kl')">Max KL</th>
                        <th @click="setSort('mean_kl')" class="sortable" :class="sortClass('mean_kl')">Mean KL</th>

                    </tr>
                </thead>
                <tbody>
                    <template x-for="w in weights" :key="w.rank">
                        <tr @click="goToWeight(w.rank)" class="clickable-row">
                            <td class="rank-cell" x-text="w.rank"></td>
                            <td x-text="w.layer >= 0 ? w.layer : '—'"></td>
                            <td><code x-text="w.component"></code></td>
                            <td><code class="param-name" x-text="w.param_name + ' ' + JSON.stringify(w.indices)"></code></td>
                            <td class="num-cell" x-text="sciFormat(w.max_kl)"></td>
                            <td class="num-cell" x-text="sciFormat(w.mean_kl)"></td>

                        </tr>
                    </template>
                </tbody>
            </table>
            <div x-show="loading" class="loading">Loading...</div>
        </div>
    </div>
</div>

    </main>
    <script src="/static/app.js"></script>
    
<script>
function sciFormat(v) {
    if (v === 0) return '0';
    if (Math.abs(v) < 0.01) return v.toExponential(1);
    if (Math.abs(v) < 1) return v.toFixed(4);
    return v.toFixed(3);
}

        fetchWeights() {
            this.loading = true;
            let results = [...ALL_WEIGHTS];
            // Apply filters
            if (this.filters.profiled === 'yes') results = results.filter(w => w.has_deep_profile);
            else if (this.filters.profiled === 'no') results = results.filter(w => !w.has_deep_profile);
            if (this.filters.layer !== '') results = results.filter(w => w.layer === parseInt(this.filters.layer));
            if (this.filters.component) results = results.filter(w => w.component === this.filters.component);

                results = results.filter(w => w.max_kl >= minKl);

                    w.param_name.toLowerCase().includes(q)

            const mult = this.sortOrder === 'asc' ? 1 : -1;
            results.sort((a, b) => {
                const va = a[field] ?? '', vb = b[field] ?? '';

                this.sortOrder = this.sortOrder === 'asc' ? 'desc' : 'asc';
